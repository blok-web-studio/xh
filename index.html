<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>xh</title>
<meta name="description" content="xh — HTTP, made human. A friendly, fast HTTP client written in Rust.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23ff6b35'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='monospace' font-size='18' font-weight='bold' fill='white'%3Exh%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c10;
  --surface:#14141c;
  --border:#23232f;
  --text:#e0e0ec;
  --muted:#6a6a82;
  --dim:#3a3a4e;
  --green:#4ade80;
  --orange:#ff6b35;
  --blue:#60a5fa;
  --pink:#f472b6;
  --yellow:#fbbf24;
  --cyan:#22d3ee;
  --red:#ef4444;
  --font:'JetBrains Mono','SF Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden}
body{display:flex;flex-direction:column}

/* ─── TERMINAL FRAME ─── */
.term-frame{
  flex:1;display:flex;flex-direction:column;
  margin:12px;border-radius:10px;overflow:hidden;
  border:1px solid var(--border);background:var(--bg);
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
  transform-style:preserve-3d;perspective:900px;
}
.term-titlebar{
  display:flex;align-items:center;gap:8px;
  padding:12px 18px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;user-select:none;
}
.term-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.term-dot.r{background:#ff5f57}
.term-dot.y{background:#ffbd2e}
.term-dot.g{background:#28c840}
.term-title{
  font-size:11px;color:var(--dim);margin-left:8px;
  letter-spacing:0.02em;text-transform:uppercase;
}
.term-body{
  flex:1;overflow-y:auto;padding:20px 24px 40px;
  scroll-behavior:smooth;
}
.term-body::-webkit-scrollbar{width:5px}
.term-body::-webkit-scrollbar-track{background:transparent}
.term-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ─── TERMINAL OUTPUT LINES ─── */
.line{opacity:0;margin-bottom:0;transform:translateY(8px);transition:opacity 0.4s ease,transform 0.4s ease}
.line.show{opacity:1;transform:translateY(0)}
.prompt{color:var(--green);user-select:none}
.cmd{color:var(--text)}
.res{padding:8px 0 8px 22px;color:var(--muted);line-height:1.8;font-size:13px}
.res .k{color:var(--blue)}
.res .s{color:var(--green)}
.res .n{color:var(--pink)}
.res .b{color:var(--yellow)}
.res .x{color:var(--dim);font-style:italic}
.res .h{color:var(--cyan)}
.res .o{color:var(--orange)}
spacer{display:block;height:8px}

/* ASCII art logo */
.logo-art{
  font-size:11px;line-height:1.15;color:var(--orange);white-space:pre;
  padding:8px 0 8px 22px;letter-spacing:0;user-select:none;
}

/* Feature grid (rendered as terminal output) */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;padding:8px 0 8px 22px}
.feat-item{
  background:var(--surface);padding:12px 16px;
  border:1px solid var(--border);border-radius:6px;
  font-size:12.5px;line-height:1.5;
}
.feat-item .tag{
  display:inline-block;padding:1px 7px;border-radius:3px;
  font-size:10px;font-weight:500;margin-bottom:4px;letter-spacing:0.03em;
}
.feat-item .tag.json{background:rgba(96,165,250,0.12);color:var(--blue)}
.feat-item .tag.auth{background:rgba(74,222,128,0.12);color:var(--green)}
.feat-item .tag.session{background:rgba(251,191,36,0.12);color:var(--yellow)}
.feat-item .tag.pipe{background:rgba(244,114,182,0.12);color:var(--pink)}
.feat-item .tag.dl{background:rgba(34,211,238,0.12);color:var(--cyan)}
.feat-item .tag.fast{background:rgba(255,107,53,0.12);color:var(--orange)}
.feat-item .name{font-weight:500;color:var(--text)}
.feat-item .desc{color:var(--muted);font-size:11.5px;margin-top:2px}

/* Stats row */
.stats-row{display:flex;gap:1px;padding:8px 0 8px 22px}
.stat-cell{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:12px 16px;text-align:center;
}
.stat-cell .val{font-size:18px;font-weight:500;color:var(--text)}
.stat-cell .val .o{color:var(--orange)}
.stat-cell .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}

/* Install block */
.install-block{padding:8px 0 8px 22px;display:flex;flex-direction:column;gap:6px}
.install-row{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:10px 14px;
}
.install-row .label{color:var(--dim);font-size:11px;min-width:55px;text-transform:uppercase;letter-spacing:0.06em}
.install-row .code{color:var(--text);flex:1}
.install-row .copy-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:4px 10px;border-radius:4px;font-family:var(--font);font-size:11px;
  cursor:pointer;transition:all 0.15s;
}
.install-row .copy-btn:hover{background:var(--surface);border-color:var(--dim);color:var(--text)}
.install-row .copy-btn.ok{background:rgba(74,222,128,0.1);border-color:var(--green);color:var(--green)}

/* BLOK footer */
.footer-line{
  padding:6px 0 0 0;margin-top:12px;border-top:1px solid var(--border);
}
.footer-line .muted{color:var(--dim);font-size:12px}
.footer-line a{color:var(--muted);text-decoration:none;transition:color 0.2s}
.footer-line a:hover{color:var(--orange)}

/* Fixed bottom prompt */
.bottom-prompt{
  position:fixed;bottom:0;left:0;right:0;
  padding:14px 24px 18px;
  background:linear-gradient(transparent,var(--bg) 40%);
  font-size:14px;z-index:10;pointer-events:none;
}
.bottom-prompt .cursor{
  display:inline-block;width:9px;height:17px;
  background:var(--green);animation:blink 1s step-end infinite;
  vertical-align:text-bottom;margin-left:3px;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ─── RESPONSIVE ─── */
@media(max-width:700px){
  .term-frame{margin:8px;border-radius:8px}
  .term-body{padding:14px 14px 30px;font-size:13px}
  .logo-art{font-size:9px}
  .feat-grid{grid-template-columns:1fr}
  .stats-row{flex-wrap:wrap}
  .stat-cell{min-width:45%}
  .res{font-size:12px;padding-left:14px}
  .install-row{flex-wrap:wrap}
}
@media(max-width:450px){
  .term-body{font-size:12px;padding:10px 10px 24px}
  .install-row .label{min-width:40px;font-size:10px}
  .logo-art{font-size:7px}
}
</style>
</head>
<body>

<!-- TERMINAL FRAME -->
<div class="term-frame" id="termFrame">
  <div class="term-titlebar">
    <span class="term-dot r"></span>
    <span class="term-dot y"></span>
    <span class="term-dot g"></span>
    <span class="term-title">xh — HTTP, made human</span>
  </div>
  <div class="term-body" id="termBody">

    <!-- Lines are dynamically populated by JS -->
    <div id="linesContainer"></div>

  </div>
</div>

<!-- BOTTOM PROMPT -->
<div class="bottom-prompt">
  <span class="prompt">$</span> <span class="cmd">_<span class="cursor"></span></span>
</div>

<script>
// ─── TERMINAL SESSION DATA ───
// Each entry: type 'cmd' | 'res' | 'art' | 'html' | 'spacer'
const session = [
  // ── Scene 1: Landing ──
  { type:'cmd', text:'xh' },
  { type:'art' },
  { type:'spacer' },

  { type:'cmd', text:'xh GET https://api.github.com/repos/ducaale/xh' },
  { type:'res', text:_j({
    "name":"xh",
    "description":"A friendly HTTP client for the terminal",
    "stars":7936,
    "language":"Rust",
    "license":"MIT",
    "downloads":"2.4M+"
  })},
  { type:'spacer' },

  // ── Scene 2: Features ──
  { type:'cmd', text:'xh --features' },
  { type:'html', id:'features' },
  { type:'spacer' },

  // ── Scene 3: POST demo ──
  { type:'cmd', text:'xh POST https://api.example.com/data name=xh type=tool' },
  { type:'res', text:_j({
    "id":"req_abc123",
    "name":"xh",
    "type":"tool",
    "created":"2024-06-15T10:30:00Z",
    "status":"active"
  })},
  { type:'spacer' },

  // ── Scene 4: Sessions ──
  { type:'cmd', text:'xh --session work GET https://api.internal.io/status' },
  { type:'res', text:_h(
    'HTTP/2.0 200 OK',
    'content-type: application/json',
    'x-session-id: work-abc123',
    '',
    _o('{') +
    '  '+_k('"status"')+': '+_s('"authenticated"')+',' +
    '  '+_k('"cookie"')+': '+_s('"persisted"')+',' +
    '  '+_k('"expires"')+': '+_s('"session persists across requests"') +
    _o('}')
  )},
  { type:'spacer' },

  // ── Scene 5: Auth ──
  { type:'cmd', text:'xh GET https://api.example.com/admin Authorization:"Bearer $TOKEN"' },
  { type:'res', text:_h(
    'HTTP/2.0 200 OK',
    'x-auth-scope: admin',
    '',
    _o('{') +
    '  '+_k('"user"')+': '+_s('"admin"')+',' +
    '  '+_k('"permissions"')+': '+_s('"[read, write, delete]"') +
    _o('}')
  )},
  { type:'spacer' },

  // ── Scene 6: Curl vs xh ──
  { type:'cmd', text:'xh --why' },
  { type:'html', id:'compare' },
  { type:'spacer' },

  // ── Scene 7: Install ──
  { type:'cmd', text:'brew install xh' },
  { type:'html', id:'install' },
  { type:'spacer' },

  // ── Scene 8: Stats ──
  { type:'cmd', text:'xh --stats' },
  { type:'html', id:'stats' },
  { type:'spacer' },
  { type:'spacer' },

  // ── Footer ──
  { type:'cmd', text:'echo "built by BLOK."' },
  { type:'html', id:'footer' },
];

// Helper: build JSON-like output for res lines
function _j(obj) {
  let out = _h('HTTP/2.0 200 OK','content-type: application/json','');
  out += _o('{') + '\n';
  const entries = Object.entries(obj);
  entries.forEach(([k,v],i) => {
    const comma = i < entries.length-1 ? ',' : '';
    if (typeof v === 'string') {
      out += '  '+_k('"'+k+'"')+': '+_s('"'+v+'"')+comma+'\n';
    } else {
      out += '  '+_k('"'+k+'"')+': '+_n(String(v))+comma+'\n';
    }
  });
  out += _o('}');
  return out;
}
function _h(...lines){return lines.map(l=>'<span class="h">'+esc(l)+'</span>').join('\n')+'\n'}
function _k(s){return '<span class="k">'+esc(s)+'</span>'}
function _s(s){return '<span class="s">'+esc(s)+'</span>'}
function _n(s){return '<span class="n">'+esc(s)+'</span>'}
function _b(s){return '<span class="b">'+esc(s)+'</span>'}
function _o(s){return '<span class="o">'+esc(s)+'</span>'}
function _x(s){return '<span class="x">'+esc(s)+'</span>'}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// HTML templates for feature, install, stats, footer
const templates = {
  features: `
<div class="feat-grid">
  <div class="feat-item"><span class="tag json">JSON</span><div class="name">Auto-formatting</div><div class="desc">Responses coloured & structured by default. No piping to jq.</div></div>
  <div class="feat-item"><span class="tag auth">Auth</span><div class="name">Native auth</div><div class="desc">Bearer tokens, basic auth, API keys — inline, zero ceremony.</div></div>
  <div class="feat-item"><span class="tag session">Sessions</span><div class="name">Persistent sessions</div><div class="desc">Auth once, reuse across requests. Cookies & headers persist.</div></div>
  <div class="feat-item"><span class="tag pipe">Output</span><div class="name">Colourised output</div><div class="desc">Every type has its own colour. Headers cyan, keys blue, strings green.</div></div>
  <div class="feat-item"><span class="tag dl">Downloads</span><div class="name">File download</div><div class="desc">Progress bars, resume, auto-filename. No extra tooling.</div></div>
  <div class="feat-item"><span class="tag fast">Rust</span><div class="name">Blazing fast</div><div class="desc">Single static binary. No Node, no Python. Zero setup.</div></div>
</div>`,

  compare: `
<div class="res" style="padding:8px 0 4px 0"><span class="h">Same request. Two experiences.</span></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 0 0 22px">
<div style="background:var(--surface);border:1px solid rgba(239,68,68,0.2);border-radius:6px;overflow:hidden">
<div style="background:rgba(239,68,68,0.08);padding:8px 12px;font-size:11px;color:var(--red);font-weight:500;border-bottom:1px solid rgba(239,68,68,0.2)">curl — 16 flags for JSON</div>
<div style="padding:10px 12px;font-size:12px;color:var(--muted);line-height:1.7">
curl -s -H "Accept: application/json" -H "Authorization: Bearer $TOKEN" -X POST https://api.example.com/data -d '{"name":"xh","type":"tool"}' | jq .<br>
<span style="color:var(--dim)">// 37 seconds later... debugging flags</span>
</div></div>
<div style="background:var(--surface);border:1px solid rgba(74,222,128,0.2);border-radius:6px;overflow:hidden">
<div style="background:rgba(74,222,128,0.08);padding:8px 12px;font-size:11px;color:var(--green);font-weight:500;border-bottom:1px solid rgba(74,222,128,0.2)">xh — 0 flags</div>
<div style="padding:10px 12px;font-size:12px;color:var(--muted);line-height:1.7">
xh POST https://api.example.com/data name=xh type=tool Authorization:"Bearer $TOKEN"<br>
<span style="color:var(--green)">✓ HTTP/2.0 201 — readable. coloured. done.</span>
</div></div>
</div>`,

  install: `
<div class="install-block">
  <div class="install-row">
    <span class="label">macOS</span>
    <span class="code">brew install xh</span>
    <button class="copy-btn" data-cmd="brew install xh">Copy</button>
  </div>
  <div class="install-row">
    <span class="label">Any</span>
    <span class="code">cargo install xh</span>
    <button class="copy-btn" data-cmd="cargo install xh">Copy</button>
  </div>
  <div class="install-row">
    <span class="label">Linux</span>
    <span class="code">snap install xh</span>
    <button class="copy-btn" data-cmd="snap install xh">Copy</button>
  </div>
  <div class="install-row">
    <span class="label">Nix</span>
    <span class="code">nix-shell -p xh</span>
    <button class="copy-btn" data-cmd="nix-shell -p xh">Copy</button>
  </div>
</div>`,

  stats: `
<div class="stats-row">
  <div class="stat-cell"><div class="val">7.9<span class="o">k</span></div><div class="lbl">Stars</div></div>
  <div class="stat-cell"><div class="val">1.8<span class="o">k</span></div><div class="lbl">Commits</div></div>
  <div class="stat-cell"><div class="val">39</div><div class="lbl">Releases</div></div>
  <div class="stat-cell"><div class="val">99<span class="o">%</span></div><div class="lbl">Rust</div></div>
</div>`,

  footer: `
<div class="footer-line">
  <span class="muted">Showcase demo for xh · Built by </span><a href="https://blok-web-studio.netlify.app" target="_blank" rel="noopener">BLOK. WebDev Studio</a>
  <span class="muted"> · </span><a href="https://github.com/ducaale/xh" target="_blank" rel="noopener">GitHub</a>
</div>`,
};

// ─── RENDER SESSION ───
const container = document.getElementById('linesContainer');
const termBody = document.getElementById('termBody');
const lines = [];

session.forEach((entry, idx) => {
  const el = document.createElement('div');
  el.className = 'line';
  el.dataset.idx = idx;

  if (entry.type === 'cmd') {
    el.innerHTML = '<span class="prompt">$ </span><span class="cmd">' + esc(entry.text) + '</span>';
  } else if (entry.type === 'res') {
    el.className = 'line res';
    // Split by \n and wrap each line for syntax highlighting
    el.innerHTML = entry.text;
  } else if (entry.type === 'art') {
    el.className = 'line';
    el.innerHTML = `<div class="logo-art">  __  _  __   __  __  __  __  __  __
 / _\\/ |/ /  /__\\/ / / / / / / / / /
/ /  |   /  \\/.,\\/ / / / / / / / / /
\\/   |__\\   \\_/\\_\\/_/_/_/_/_/_/_/_/</div>`;
  } else if (entry.type === 'html') {
    el.className = 'line';
    el.innerHTML = templates[entry.id] || '';
  } else if (entry.type === 'spacer') {
    el.className = 'line';
    el.style.height = '12px'; el.style.opacity = '1'; el.style.transform = 'none';
  }

  container.appendChild(el);
  lines.push(el);
});

// ─── SCROLL-REVEAL (typewriter-style) ───
function isVisible(el) {
  if (!el) return false;
  const rect = el.getBoundingClientRect();
  const threshold = window.innerHeight * 0.78;
  return rect.top < threshold;
}

let revealedCount = 0;
function revealLines() {
  for (let i = revealedCount; i < lines.length; i++) {
    const el = lines[i];
    if (!el || el.dataset.idx === undefined) continue;
    if (isVisible(el)) {
      el.classList.add('show');
      revealedCount = i + 1;
    } else {
      break;
    }
  }
}

termBody.addEventListener('scroll', revealLines, { passive: true });
window.addEventListener('resize', revealLines, { passive: true });

// Initial reveal after a moment
setTimeout(revealLines, 200);
setTimeout(revealLines, 600);

// ─── TYPEWRITER EFFECT FOR COMMANDS ───
// After a command line is revealed, type its text character by character
let typingTimeout = null;
function watchTyping() {
  const cmds = container.querySelectorAll('.line.cmd, .line:not(.res):not(.spacer)');
  // Actually we track typing by detecting newly shown lines
  const shown = container.querySelectorAll('.line.show');
  shown.forEach(el => {
    if (el.dataset.typed) return;
    const cmdSpan = el.querySelector('.cmd');
    if (!cmdSpan) return;
    const fullText = cmdSpan.textContent;
    if (!fullText || fullText.length < 3) { el.dataset.typed = '1'; return; }

    el.dataset.typed = '1';
    // Clear and type
    cmdSpan.textContent = '';
    let ci = 0;
    const typeInterval = setInterval(() => {
      if (ci < fullText.length) {
        cmdSpan.textContent += fullText[ci];
        ci++;
        // Auto-scroll to keep cursor in view
        termBody.scrollTop = termBody.scrollHeight;
      } else {
        clearInterval(typeInterval);
      }
    }, 22);
  });
}

// Override: instead of typing on scroll, we do a simpler staggered reveal
// Let's make lines reveal with a slight delay cascade
function cascadeReveal() {
  for (let i = 0; i < lines.length; i++) {
    const el = lines[i];
    if (!el || el.classList.contains('show') || el.classList.contains('spacer')) continue;
    if (isVisible(el)) {
      // Show it with a delay based on distance from viewport top
      const rect = el.getBoundingClientRect();
      const delay = Math.max(0, (rect.top - 100) * 0.3);
      setTimeout(() => {
        el.classList.add('show');
        // If it's a command line, type it out
        const cmdSpan = el.querySelector('.cmd');
        if (cmdSpan && !el.dataset.typed) {
          const txt = cmdSpan.textContent;
          cmdSpan.textContent = '';
          el.dataset.typed = '1';
          let ci = 0;
          const ti = setInterval(() => {
            if (ci < txt.length) {
              cmdSpan.textContent += txt[ci];
              ci++;
            } else { clearInterval(ti); }
          }, 18);
        }
      }, delay);
    }
  }
}

termBody.addEventListener('scroll', cascadeReveal, { passive: true });
window.addEventListener('resize', cascadeReveal, { passive: true });
setTimeout(cascadeReveal, 100);
setTimeout(cascadeReveal, 500);

// ─── COPY BUTTONS ───
document.addEventListener('click', async (e) => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const cmd = btn.dataset.cmd;
  if (!cmd) return;
  try {
    await navigator.clipboard.writeText(cmd);
    btn.textContent = '✓';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1800);
  } catch {}
});

// ─── HERO TERMINAL MOUSE TILT ───
(function() {
  const frame = document.getElementById('termFrame');
  if (!frame) return;
  const isMobile = window.matchMedia('(pointer: coarse)').matches;
  if (isMobile) return;

  let mx = 0, my = 0;
  let rotX = 0, rotY = 0;
  const maxAngle = 1.6;
  const lerpSpeed = 0.04;
  let rafId = null;

  window.addEventListener('mousemove', (e) => {
    mx = ((e.clientX / window.innerWidth) - 0.5) * 2;
    my = ((e.clientY / window.innerHeight) - 0.5) * 2;
  }, { passive: true });

  function tick() {
    rotY += ((mx * maxAngle) - rotY) * lerpSpeed;
    rotX += ((-my * maxAngle) - rotX) * lerpSpeed;
    const s = 1 - (Math.abs(rotX) + Math.abs(rotY)) * 0.003;
    frame.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) scale(${s})`;
    rafId = requestAnimationFrame(tick);
  }

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !rafId) tick();
      else if (!entry.isIntersecting && rafId) {
        cancelAnimationFrame(rafId); rafId = null;
        frame.style.transform = ''; rotX = 0; rotY = 0;
      }
    });
  }, { threshold: 0 });
  obs.observe(frame);
})();
</script>
</body>
</html>
